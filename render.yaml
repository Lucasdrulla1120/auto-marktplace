services:
  - type: web
    name: auto-marketplace-api
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma db push && node prisma/seed.js && npm run build
    startCommand: npm start
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: auto-marketplace-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
  - type: static
    name: auto-marketplace-web
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://auto-marketplace-api.onrender.com/api
databases:
  - name: auto-marketplace-db
    plan: free
