services:
  - type: web
    name: auto-marketplace-api
    env: node
    rootDir: backend
    buildCommand: npm install && npm run deploy:prepare
    startCommand: npm start
    plan: starter
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: auto-marketplace-db
          property: connectionString
      - key: PORT
        value: 4000
      - key: HOST
        value: 0.0.0.0
  - type: web
    name: auto-marketplace-web
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://api.seudominio.com/api
databases:
  - name: auto-marketplace-db
    plan: starter
